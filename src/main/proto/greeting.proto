syntax = "proto3";

package greeting;

// Well-known type bawaan protobuf untuk merepresentasikan instant waktu (detik + nanodetik
// sejak epoch). Dipakai karena proto3 tidak punya tipe date/datetime native — field birth_date
// dan processed_at di bawah bertipe google.protobuf.Timestamp, bukan string tanggal biasa.
import "google/protobuf/timestamp.proto";

// true -> tiap message/service/enum di-generate jadi file .java top-level terpisah
// (HelloRequest.java, HelloReply.java, dst), bukan dibungkus sebagai inner class dari satu
// outer class. Hasilnya import di sisi Java lebih ringkas: "HelloRequest" bukan "GreetingProto.HelloRequest".
option java_multiple_files = true;
// Package Java tempat kelas-kelas hasil generate protoc diletakkan.
option java_package = "com.example.grpcsample.grpc";
// Nama kelas pembungkus (dipakai protoc sebagai identitas file ini; hanya relevan
// sebagai outer class kalau java_multiple_files di-set false).
option java_outer_classname = "GreetingProto";

// Kontrak service gRPC: mendefinisikan operasi yang bisa dipanggil beserta bentuk data-nya.
// File inilah yang di-generate protobuf-maven-plugin menjadi kelas Java saat "mvn compile".
service GreetingService {
  rpc SayHello (HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
  int32 age = 2;
  double height_cm = 3;
  google.protobuf.Timestamp birth_date = 4;
}

message HelloReply {
  string message = 1;
  int32 age_next_year = 2;
  double height_m = 3;
  google.protobuf.Timestamp processed_at = 4;
}
