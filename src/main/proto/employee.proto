syntax = "proto3";

package employee;

// Well-known type bawaan protobuf untuk merepresentasikan instant waktu (detik + nanodetik
// sejak epoch). Dipakai karena proto3 tidak punya tipe date/datetime native — field join_date
// dan registered_at di bawah bertipe google.protobuf.Timestamp, bukan string tanggal biasa.
import "google/protobuf/timestamp.proto";

// true -> tiap message/service/enum di-generate jadi file .java top-level terpisah
// (RegisterEmployeeRequest.java, dst), bukan dibungkus sebagai inner class dari satu
// outer class. Hasilnya import di sisi Java lebih ringkas: "RegisterEmployeeRequest"
// bukan "EmployeeProto.RegisterEmployeeRequest".
option java_multiple_files = true;
// Package Java tempat kelas-kelas hasil generate protoc diletakkan. Sengaja disamakan
// dengan greeting.proto supaya kedua service berbagi satu package Java yang sama;
// aman karena nama message/enum/service di kedua file tidak ada yang bentrok.
option java_package = "com.example.grpcsample.grpc";
// Nama kelas pembungkus (dipakai protoc sebagai identitas file ini; hanya relevan
// sebagai outer class kalau java_multiple_files di-set false).
option java_outer_classname = "EmployeeProto";

service EmployeeService {
  rpc RegisterEmployee (RegisterEmployeeRequest) returns (RegisterEmployeeResponse);
}

enum Gender {
  GENDER_UNKNOWN = 0;
  MALE = 1;
  FEMALE = 2;
}

enum EmployeeStatus {
  STATUS_PENDING = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
}

message RegisterEmployeeRequest {
  string full_name = 1;
  string email = 2;
  int32 age = 3;
  int64 national_id = 4;
  double salary = 5;
  float performance_score = 6;
  bool is_active = 7;
  Gender gender = 8;
  string department = 9;
  repeated string skills = 10;
  google.protobuf.Timestamp join_date = 11;
}

message RegisterEmployeeResponse {
  bool success = 1;
  string message = 2;
  string employee_code = 3;
  int64 employee_id = 4;
  double annual_salary = 5;
  float bonus_percentage = 6;
  EmployeeStatus status = 7;
  string department = 8;
  repeated string assigned_teams = 9;
  google.protobuf.Timestamp registered_at = 10;
}
